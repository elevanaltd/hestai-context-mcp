name: ci

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}
      - name: Ruff
        run: uv run ruff check src tests
      - name: Black
        run: uv run black --check src tests

  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}
      - name: Mypy
        run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}
      - name: Pytest with coverage threshold
        run: uv run pytest --cov-fail-under=85

  final_gate:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, typecheck, test]
    steps:
      - name: Final gate
        run: |
          set -euo pipefail

          echo "RESULT::lint=${{ needs.lint.result }}"
          echo "RESULT::typecheck=${{ needs.typecheck.result }}"
          echo "RESULT::test=${{ needs.test.result }}"

          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "ERROR::required_job_failed::lint::${{ needs.lint.result }}"
            exit 1
          fi
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "ERROR::required_job_failed::typecheck::${{ needs.typecheck.result }}"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "ERROR::required_job_failed::test::${{ needs.test.result }}"
            exit 1
          fi

          echo "OK::final_gate_passed"
